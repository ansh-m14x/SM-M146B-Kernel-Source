name: 🏗️ Build Kernel (KSU-Next + SUSFS)

# ──────────────────────────────────────────────
# 1. Triggers (Why it wasn't showing up!)
# ──────────────────────────────────────────────
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # <--- This is what gives you the "Run workflow" button in the Actions tab

jobs:
  build-kernel:
    name: 🏗️ Build s5e8535 / M14
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      # We set this globally so all steps can read it
      SUSFS_BRANCH: "gki-android13-5.15"

    steps:
      # ──────────────────────────────────────────────
      # 2. Preparation & Checkout
      # ──────────────────────────────────────────────
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MrPankaj24/SM-M146B-Kernel-Source
          ref: main
          fetch-depth: 1

      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget bc bison flex libssl-dev libelf-dev python3 python-is-python3 \
            make gcc gcc-aarch64-linux-gnu binutils binutils-aarch64-linux-gnu \
            g++ cpio zip unzip lz4 zstd xz-utils libncurses-dev libncurses5-dev \
            kmod rsync lld llvm clang dwarves pahole ccache device-tree-compiler \
            zlib1g-dev libc6-dev-i386 cmake ninja-build

      # ──────────────────────────────────────────────
      # 3. Download & Setup Toolchain
      # ──────────────────────────────────────────────
      - name: 🔧 Cache Toolchains
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            toolchain/clang/host/linux-x86/clang-r450784d
            toolchain/build/kernel/build-tools
            toolchain/prebuilts/kernel-build-tools
          key: toolchain-clang-r450784d-v1

      - name: ⬇️ Download Clang r450784d (AOSP)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain/clang/host/linux-x86/clang-r450784d
          echo "Downloading Clang r450784d..."
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-release/clang-r450784d.tar.gz" -o /tmp/clang.tar.gz
          tar -xzf /tmp/clang.tar.gz -C toolchain/clang/host/linux-x86/clang-r450784d
          rm /tmp/clang.tar.gz

      - name: ⬇️ Download Kernel Build Tools
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b main https://android.googlesource.com/kernel/prebuilts/build-tools toolchain/build/kernel/build-tools
          mkdir -p toolchain/build/kernel/build-tools/path
          ln -sf $(pwd)/toolchain/build/kernel/build-tools/linux-x86 toolchain/build/kernel/build-tools/path/linux-x86
          ln -sf $(pwd)/toolchain/build/kernel/build-tools/sysroots/x86_64-unknown-linux-musl toolchain/build/kernel/build-tools/sysroot

      - name: ⬇️ Download Prebuilt Tools (for pahole)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://android.googlesource.com/kernel/prebuilts/build-tools toolchain/prebuilts/kernel-build-tools

      # ──────────────────────────────────────────────
      # 4. Inject Modifications (KSU & SUSFS)
      # ──────────────────────────────────────────────
      - name: 🛡️ Patch KernelSU-Next
        run: |
          echo ">>> Injecting KernelSU-Next..."
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s stable

      - name: 🥷 Apply SUSFS & Samsung Rejection Patches
        run: |
          echo ">>> Cloning SUSFS ($SUSFS_BRANCH)..."
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b $SUSFS_BRANCH /tmp/susfs4ksu
          
          echo ">>> Copying SUSFS files to fs/ and include/linux/..."
          cp -rv /tmp/susfs4ksu/kernel_patches/fs/* fs/
          cp -rv /tmp/susfs4ksu/kernel_patches/include/linux/* include/linux/
          
          echo ">>> Applying standard SUSFS core patch..."
          patch -p1 < /tmp/susfs4ksu/kernel_patches/50_add_susfs_in_${SUSFS_BRANCH}.patch || true

          echo ">>> Downloading WildKernels Samsung Fixes..."
          git clone https://github.com/WildKernels/kernel_patches.git /tmp/kernel_patches
          
          echo ">>> Applying Exynos Compatibility Patches (A54 -> M14)..."
          # We pull the A546B patches because the Exynos 1380 layout is extremely similar to your 1330
          cp /tmp/kernel_patches/samsung/SM-A546B-Oneui7/* ./
          
          # Force apply the rejection fixes to connect the SUSFS hooks!
          patch -p1 < fix_namespace.patch || true
          patch -p1 < fix_base.patch || true
          patch -p1 < fix_exec.patch || true
      # ──────────────────────────────────────────────
      # 5. Build The Kernel
      # ──────────────────────────────────────────────
      - name: 🔨 Compile Kernel
        run: |
          set -e

          # ── Set up Paths & Flags ──
          export PATH=$(pwd)/toolchain/clang/host/linux-x86/clang-r450784d/bin:$PATH
          export PATH=$(pwd)/toolchain/build/kernel/build-tools/path/linux-x86/:$PATH

          export HOSTCFLAGS="-I$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/include"
          export HOSTLDFLAGS="-Wl,-rpath,$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/lib64 -L$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/lib64 -fuse-ld=lld --rtlib=compiler-rt"

          export DTC_FLAGS="-@"
          export PLATFORM_VERSION=15
          export ANDROID_MAJOR_VERSION=v
          export LLVM=1
          export DEPMOD=depmod
          export ARCH=arm64
          export TARGET_SOC=s5e8535

          echo ">>> 1. Generating Base Config..."
          make s5e8535-m14xnsxx_defconfig

          echo ">>> 2. Enabling KSU, SUSFS, and Mountify..."
          # Core Root Features
          scripts/config --enable CONFIG_KSU
          scripts/config --enable CONFIG_KSU_SUSFS

          # --- Enable Stealth Inline Hooking ---
          scripts/config --enable CONFIG_KSU_INLINE_HOOK
          
          # Mountify Requirements
          scripts/config --enable CONFIG_TMPFS_XATTR
          scripts/config --enable CONFIG_TMPFS_POSIX_ACL
          
          # KSU Dependencies
          scripts/config --enable CONFIG_KPROBES
          scripts/config --enable CONFIG_HAVE_KPROBES
          scripts/config --enable CONFIG_KPROBE_EVENTS
          
          # Apply the new configs cleanly
          make olddefconfig

          echo ">>> 3. Compiling (Using $(nproc) threads)..."
          make -j$(nproc) 2>&1 | tee /tmp/kernel_build.log

      # ──────────────────────────────────────────────
      # 6. Collect & Upload
      # ──────────────────────────────────────────────
      - name: 📦 Collect Artifacts
        if: success()
        run: |
          mkdir -p out/kernel
          [ -f arch/arm64/boot/Image ] && cp arch/arm64/boot/Image out/kernel/
          [ -f arch/arm64/boot/Image.gz ] && cp arch/arm64/boot/Image.gz out/kernel/
          
          if [ -d arch/arm64/boot/dts/exynos ]; then
            mkdir -p out/dtbs
            find arch/arm64/boot/dts/exynos -name "*.dtb" | grep -i "s5e8535\|m14" | xargs -I{} cp {} out/dtbs/ 2>/dev/null || true
          fi

      - name: ⬆️ Upload Final Kernel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-s5e8535-ksu-susfs
          path: out/
          retention-days: 30

      - name: ⬆️ Upload Build Log (On Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: /tmp/kernel_build.log
          retention-days: 7
