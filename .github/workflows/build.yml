name: 🏗️ M14 5G Kernel (KSU + SUSFS)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        repository: ansh-m14x/SM-M146B-Kernel-Source # YOUR REPO
        path: android_kernel

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential bc bison flex libssl-dev libncurses5-dev zip curl python3 rsync

    - name: Setup Proton Clang
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang toolchain

    - name: Clone KSU & SUSFS
      run: |
        # Using the Android 14/15 compatible SUSFS branch
        git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android14-6.1
        git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3

    - name: Setup KernelSU
      working-directory: android_kernel
      run: |
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

    - name: Patch SUSFS
      working-directory: android_kernel
      run: |
        # 1. Copy SUSFS headers
        cp ../susfs4ksu/kernel_patches/include/linux/*.h ./include/linux/
        cp ../susfs4ksu/kernel_patches/fs/* ./fs/
        
        # 2. Apply SUSFS Patches (Note: We use 6.1 for Android 15/A14 logic)
        # If your kernel version is different, we adjust this patch file name
        cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch ./
        patch -p1 < 50_add_susfs_in_gki-android14-6.1.patch || echo "Patch ignored - manual merge might be needed"

    - name: Build Kernel
      working-directory: android_kernel
      run: |
        export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
        export ARCH=arm64
        export KBUILD_BUILD_USER="Ansh"
        export KBUILD_BUILD_HOST="M14-KSU"
        
        # Build commands
        make O=out LLVM=1 LLVM_IAS=1 s5e8535-m14xnsxx_defconfig
        
        # Enable KSU & SUSFS manually in config
        scripts/config --file out/.config --enable CONFIG_KSU
        scripts/config --file out/.config --enable CONFIG_KSU_SUSFS
        
        make -j$(nproc) O=out LLVM=1 LLVM_IAS=1 Image

    - name: Package AnyKernel3
      run: |
        cp android_kernel/out/arch/arm64/boot/Image AnyKernel3/
        cd AnyKernel3
        zip -r9 "../Ansh-M14-KSU-SUSFS.zip" *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Ansh-M14-KernelSU
        path: Ansh-M14-KSU-SUSFS.zip
